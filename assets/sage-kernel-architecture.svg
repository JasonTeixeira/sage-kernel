<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Sage Kernel architecture</title>
  <desc id="desc">A layered architecture diagram showing MCP clients, CLI, dashboard, runtime, policy, jobs, templates, QA, persistence, and release gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; fill: #0f766e; text-transform: uppercase; }
      .title { font-size: 38px; font-weight: 800; }
      .subtitle { font-size: 18px; fill: #475569; }
      .box-title { font-size: 18px; font-weight: 800; }
      .box-copy { font-size: 13px; fill: #475569; }
      .small { font-size: 12px; fill: #64748b; }
      .card { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; filter: url(#shadow); }
      .soft { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 1; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .accent { fill: url(#core); }
    </style>
  </defs>

  <rect width="1200" height="720" rx="0" fill="url(#bg)"/>

  <text x="64" y="72" class="eyebrow">MCP-native engineering operating system</text>
  <text x="64" y="118" class="title">Sage Kernel</text>
  <text x="64" y="150" class="subtitle">A local control plane for audits, QA, approvals, jobs, templates, persistence, and release readiness.</text>

  <rect x="64" y="198" width="232" height="116" rx="8" class="card"/>
  <text x="88" y="232" class="box-title">MCP Clients</text>
  <text x="88" y="260" class="box-copy">Codex, Claude Desktop, Cursor</text>
  <text x="88" y="284" class="small">stdio config, tools, resources, prompts</text>

  <rect x="64" y="348" width="232" height="116" rx="8" class="card"/>
  <text x="88" y="382" class="box-title">Human Interfaces</text>
  <text x="88" y="410" class="box-copy">sage CLI and local dashboard</text>
  <text x="88" y="434" class="small">daily workflows and visual operations</text>

  <rect x="384" y="214" width="432" height="220" rx="8" class="accent" filter="url(#shadow)"/>
  <text x="420" y="260" class="box-title" fill="#ffffff">MCP Server And Runtime</text>
  <text x="420" y="294" fill="#dbeafe" font-size="15">Canonical product entry point</text>
  <rect x="420" y="324" width="160" height="64" rx="8" fill="#ffffff" opacity="0.92"/>
  <text x="440" y="352" class="box-title" font-size="15">Tool Registry</text>
  <text x="440" y="374" class="small">strict manifests</text>
  <rect x="620" y="324" width="160" height="64" rx="8" fill="#ffffff" opacity="0.92"/>
  <text x="640" y="352" class="box-title" font-size="15">Dispatcher</text>
  <text x="640" y="374" class="small">runtime calls</text>

  <rect x="884" y="198" width="252" height="116" rx="8" class="card"/>
  <text x="908" y="232" class="box-title">Policy And Security</text>
  <text x="908" y="260" class="box-copy">permissions, read-only mode</text>
  <text x="908" y="284" class="small">signed approvals and audit records</text>

  <rect x="884" y="348" width="252" height="116" rx="8" class="card"/>
  <text x="908" y="382" class="box-title">Quality Gates</text>
  <text x="908" y="410" class="box-copy">tests, coverage, MCP smoke</text>
  <text x="908" y="434" class="small">security, stress, release checks</text>

  <rect x="90" y="548" width="180" height="86" rx="8" class="soft"/>
  <text x="114" y="582" class="box-title" font-size="16">Catalog</text>
  <text x="114" y="608" class="small">repos, templates, phases</text>

  <rect x="306" y="548" width="180" height="86" rx="8" class="soft"/>
  <text x="330" y="582" class="box-title" font-size="16">Templates</text>
  <text x="330" y="608" class="small">production scaffolds</text>

  <rect x="522" y="548" width="180" height="86" rx="8" class="soft"/>
  <text x="546" y="582" class="box-title" font-size="16">Jobs</text>
  <text x="546" y="608" class="small">queue and run history</text>

  <rect x="738" y="548" width="180" height="86" rx="8" class="soft"/>
  <text x="762" y="582" class="box-title" font-size="16">Persistence</text>
  <text x="762" y="608" class="small">SQLite and Postgres</text>

  <rect x="954" y="548" width="180" height="86" rx="8" class="soft"/>
  <text x="978" y="582" class="box-title" font-size="16">Dashboard</text>
  <text x="978" y="608" class="small">local cockpit</text>

  <path class="line" d="M296 256 H374"/>
  <path class="line" d="M296 406 H374"/>
  <path class="line" d="M816 324 H872"/>
  <path class="line" d="M816 386 H872"/>
  <path class="line" d="M600 434 V526"/>
  <path class="line" d="M600 526 H180 V548"/>
  <path class="line" d="M600 526 H396 V548"/>
  <path class="line" d="M600 526 H612 V548"/>
  <path class="line" d="M600 526 H828 V548"/>
  <path class="line" d="M600 526 H1044 V548"/>

  <text x="64" y="684" class="small">Local-first by default. Public network exposure requires separate authentication, authorization, and deployment hardening.</text>
</svg>
