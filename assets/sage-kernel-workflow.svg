<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Sage Kernel daily workflow</title>
  <desc id="desc">An animated workflow diagram showing a request moving through MCP, policy, execution, persistence, and release proof.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .title { font-size: 32px; font-weight: 850; }
      .copy { font-size: 15px; fill: #475569; }
      .step { fill: url(#panel); stroke: #d8e1ee; stroke-width: 1.2; }
      .step-title { font-size: 17px; font-weight: 800; }
      .step-copy { font-size: 12px; fill: #64748b; }
      .rail { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .pulse { fill: #0f766e; stroke: #ccfbf1; stroke-width: 5; }
      .badge { fill: #ecfeff; stroke: #67e8f9; stroke-width: 1; }
      .badge-text { font-size: 12px; font-weight: 750; fill: #155e75; }
      @media (prefers-reduced-motion: no-preference) {
        .pulse { animation: travel 7s ease-in-out infinite; }
        .glow { animation: fade 7s ease-in-out infinite; }
      }
      @keyframes travel {
        0%, 8% { transform: translate(0, 0); }
        20% { transform: translate(190px, 0); }
        36% { transform: translate(382px, 0); }
        52% { transform: translate(574px, 0); }
        68% { transform: translate(766px, 0); }
        84%, 100% { transform: translate(958px, 0); }
      }
      @keyframes fade {
        0%, 100% { opacity: 0.18; }
        50% { opacity: 0.42; }
      }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#f8fafc"/>

  <text x="56" y="66" class="title">Daily Engineering Flow</text>
  <text x="56" y="96" class="copy">One local kernel connects an AI client, policy boundary, execution engine, persistence layer, dashboard, and release proof.</text>

  <path d="M132 248 H1068" class="rail"/>
  <circle cx="132" cy="248" r="16" class="pulse"/>
  <circle cx="132" cy="248" r="42" fill="#14b8a6" opacity="0.18" class="glow"/>

  <rect x="48" y="156" width="168" height="132" rx="8" class="step"/>
  <text x="72" y="192" class="step-title">1. Ask</text>
  <text x="72" y="222" class="step-copy">Codex, Claude, Cursor,</text>
  <text x="72" y="242" class="step-copy">CLI, or dashboard action</text>
  <rect x="72" y="256" width="74" height="24" rx="6" class="badge"/>
  <text x="86" y="273" class="badge-text">MCP</text>

  <rect x="240" y="156" width="168" height="132" rx="8" class="step"/>
  <text x="264" y="192" class="step-title">2. Validate</text>
  <text x="264" y="222" class="step-copy">schema, manifest, risk,</text>
  <text x="264" y="242" class="step-copy">permission, root boundary</text>

  <rect x="432" y="156" width="168" height="132" rx="8" class="step"/>
  <text x="456" y="192" class="step-title">3. Approve</text>
  <text x="456" y="222" class="step-copy">safe tools run now,</text>
  <text x="456" y="242" class="step-copy">risky tools need approval</text>

  <rect x="624" y="156" width="168" height="132" rx="8" class="step"/>
  <text x="648" y="192" class="step-title">4. Execute</text>
  <text x="648" y="222" class="step-copy">QA, jobs, templates,</text>
  <text x="648" y="242" class="step-copy">infra, audits, releases</text>

  <rect x="816" y="156" width="168" height="132" rx="8" class="step"/>
  <text x="840" y="192" class="step-title">5. Persist</text>
  <text x="840" y="222" class="step-copy">runs, jobs, approvals,</text>
  <text x="840" y="242" class="step-copy">audit records, exports</text>

  <rect x="1008" y="156" width="168" height="132" rx="8" class="step"/>
  <text x="1032" y="192" class="step-title">6. Prove</text>
  <text x="1032" y="222" class="step-copy">coverage, smoke, security,</text>
  <text x="1032" y="242" class="step-copy">stress, CI, release gates</text>

  <rect x="120" y="356" width="960" height="84" rx="8" fill="#0f172a"/>
  <text x="154" y="390" fill="#ffffff" font-size="18" font-weight="800">Example day</text>
  <text x="154" y="420" fill="#cbd5e1" font-size="15">sage daily -> sage audit . -> sage full-qa . -> sage pending -> sage release worker-service docker -> dashboard review</text>
</svg>
