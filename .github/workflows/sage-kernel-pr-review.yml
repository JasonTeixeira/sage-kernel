name: Sage Kernel PR Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Kernel scorecard on PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install system SQLite
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install dependencies
        run: npm ci

      - name: Run kernel PR review
        id: review
        run: |
          node scripts/pr-report.mjs | tee "$RUNNER_TEMP/sage-pr-report.md"
        continue-on-error: true

      - name: Post scorecard as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RUNNER_TEMP + '/sage-pr-report.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
            });
            const marker = '## 🛡️ Sage Kernel Review';
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Fail the check if the kernel gate failed
        run: node scripts/pr-report.mjs > /dev/null
