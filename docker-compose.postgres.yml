services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sage
      POSTGRES_PASSWORD: sage
      POSTGRES_DB: sage_kernel
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sage -d sage_kernel"]
      interval: 10s
      timeout: 5s
      retries: 5
